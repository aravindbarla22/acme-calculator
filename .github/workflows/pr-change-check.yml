name: pr-change-check

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  change-check:
    name: ServiceNow Change Gate
    runs-on: ubuntu-latest

    steps:
      - name: Create ServiceNow Change
        id: create_change
        uses: ServiceNow/servicenow-devops-change@v6.1.0
        with:
          devops-integration-token: ${{ secrets.SN_DEVOPS_INTEGRATION_TOKEN }}
          instance-url: ${{ secrets.SN_INSTANCE_URL }}
          tool-id: ${{ secrets.SN_ORCHESTRATION_TOOL_ID }}
          context-github: ${{ toJSON(github) }}
          job-name: "ServiceNow Change Gate"
          change-request: >
            {
              "attributes":{
                "short_description":"PR Change for ACME Calculator",
                "description":"Change created during PR validation. Merge is blocked until approval is complete.",
                "implementation_plan":"Review PR, validate calculator updates, approve change, then merge to main.",
                "backout_plan":"Reject PR or revert merge if validation fails.",
                "test_plan":"Validate calculator UI and functions before merge."
              }
            }

      - name: Extract change number
        id: extract
        shell: bash
        run: |
          RAW='${{ steps.create_change.outputs.change-request-details }}'
          echo "$RAW" > change-details.json

          CHANGE_NUMBER=$(jq -r '.number // empty' change-details.json)

          if [ -z "$CHANGE_NUMBER" ]; then
            echo "Could not extract change number"
            cat change-details.json
            exit 1
          fi

          echo "change_number=$CHANGE_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Created change: $CHANGE_NUMBER"

      - name: Wait for change approval
        id: wait_for_change
        shell: bash
        run: |
          echo "Waiting for change approval..."

          for i in $(seq 1 20); do
            echo "Check attempt $i"

            gh_status_file="get-change-status-$i.txt"

            echo "running status check for change ${{ steps.extract.outputs.change_number }}"

            # this step is simulated through a nested workflow command pattern
            # actual status lookup happens in the next step through outputs
            sleep 30
          done

      - name: Get change status
        id: get_change
        uses: ServiceNow/servicenow-devops-get-change@main
        with:
          devops-integration-token: ${{ secrets.SN_DEVOPS_INTEGRATION_TOKEN }}
          instance-url: ${{ secrets.SN_INSTANCE_URL }}
          tool-id: ${{ secrets.SN_ORCHESTRATION_TOOL_ID }}
          context-github: ${{ toJSON(github) }}
          change-details: >
            {
              "number":"${{ steps.extract.outputs.change_number }}"
            }

      - name: Validate change status
        shell: bash
        run: |
          STATUS='${{ steps.get_change.outputs.status }}'
          echo "Returned status: $STATUS"

          if [ "$STATUS" = "approved" ] || [ "$STATUS" = "implement" ] || [ "$STATUS" = "scheduled" ] || [ "$STATUS" = "success" ]; then
            echo "Change is approved and PR can proceed"
            exit 0
          fi

          echo "Change is not approved yet"
          exit 1
