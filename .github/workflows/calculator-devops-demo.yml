name: calculator-devops-demo

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate calculator files
        run: |
          test -f index.html
          test -f styles.css
          test -f script.js
          echo "Calculator files validated"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_URL }}
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORG_KEY }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.projectName=acme-calculator-web
            -Dsonar.sources=.
            -Dsonar.exclusions=dist/**,node_modules/**,.github/**
            -Dsonar.sourceEncoding=UTF-8
            -X

      - name: Register Sonar results in ServiceNow
        uses: ServiceNow/servicenow-devops-sonar@v3.1.0
        with:
          devops-integration-token: ${{ secrets.SN_DEVOPS_INTEGRATION_TOKEN }}
          instance-url: ${{ secrets.SN_INSTANCE_URL }}
          tool-id: ${{ secrets.SN_ORCHESTRATION_TOOL_ID }}
          context-github: ${{ toJSON(github) }}
          job-name: "Build"
          sonar-host-url: ${{ secrets.SONAR_URL }}
          sonar-project-key: ${{ secrets.SONAR_PROJECT_KEY }}
          sonar-org-key: ${{ secrets.SONAR_ORG_KEY }}

      - name: Package app
        run: |
          mkdir -p dist
          cp index.html dist/
          cp styles.css dist/
          cp script.js dist/
          echo "Calculator app packaged"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: acme-calculator-build
          path: dist/

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: acme-calculator-build
          path: dist/

      - name: Create ServiceNow Change
        id: create_change
        uses: ServiceNow/servicenow-devops-change@v6.1.0
        with:
          devops-integration-token: ${{ secrets.SN_DEVOPS_INTEGRATION_TOKEN }}
          instance-url: ${{ secrets.SN_INSTANCE_URL }}
          tool-id: ${{ secrets.SN_ORCHESTRATION_TOOL_ID }}
          context-github: ${{ toJSON(github) }}
          job-name: "Deploy"
          change-request: >
            {
              "setCloseCode":"true",
              "autoCloseChange":true,
              "attributes":{
                "short_description":"Deploy ACME Calculator to production",
                "description":"Automated deployment of ACME Calculator demo app with GitHub Actions, Sonar quality traceability, and ServiceNow DevOps Change Velocity.",
                "implementation_plan":"Validate source files, run Sonar scan, register Sonar results in ServiceNow, create change, and deploy calculator artifact.",
                "backout_plan":"Rollback to previous GitHub commit or previous build artifact if validation fails.",
                "test_plan":"Verify calculator loads and supports add, subtract, multiply, divide, decimal, clear, and delete operations.",
                "category":"Software",
                "priority":"3",
                "risk":"3"
              }
            }

      - name: Simulate deployment
        run: |
          test -f dist/index.html
          test -f dist/styles.css
          test -f dist/script.js
          echo "Deployment completed successfully"

      - name: Show completion
        run: |
          echo "Build, Sonar, change creation, and deployment completed"
