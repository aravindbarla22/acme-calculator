name: calculator-change

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Validate project files
        run: |
          test -f index.html
          test -f styles.css
          test -f script.js
          echo "Calculator project files found"

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Create ServiceNow Change
        id: create_change
        uses: ServiceNow/servicenow-devops-change@v6.1.0
        with:
          devops-integration-token: ${{ secrets.SN_DEVOPS_INTEGRATION_TOKEN }}
          instance-url: ${{ secrets.SN_INSTANCE_URL }}
          tool-id: ${{ secrets.SN_ORCHESTRATION_TOOL_ID }}
          context-github: ${{ toJSON(github) }}
          job-name: "Deploy"
          change-request: >
            {
              "setCloseCode":"true",
              "autoCloseChange":true,
              "attributes":{
                "short_description":"Deploy ACME Calculator to production",
                "description":"Automated deployment for ACME Calculator demo application from GitHub Actions into production environment.",
                "assignment_group":"a715cd759f2002002920bde8132e7018",
                "implementation_plan":"Deploy calculator HTML, CSS, and JavaScript files through GitHub Actions after successful build validation.",
                "backout_plan":"Rollback to previous GitHub release or revert the last deployment commit if validation fails in production.",
                "test_plan":"Validate calculator loads successfully and basic operations like addition, subtraction, multiplication, and division work as expected."
              }
            }

      - name: Show created change details
        run: |
          echo "ServiceNow change step completed"
